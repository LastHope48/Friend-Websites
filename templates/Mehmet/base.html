<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
{% block style %}{% endblock %}
{% block head_extra %}{% endblock %}
{% block css %}{% endblock %}
<style>
    .side-bar{
        border-radius: 0;
        margin: 0;
        width: 20%;
        background:linear-gradient(to right, rgb(31, 161, 204),blue);
        overflow: hidden;
        padding: 0;
    }
    .side-bar ul{
        list-style-type: none;
        padding: 0;
        margin:60px 0 700px 0;
    }
    .side-bar ul li{
        padding: 20px;
        font-size: 30px;
        display: block;
        margin-bottom: 20px;
        cursor: pointer;
    }
    .side-bar ul li:hover {
        background-color: rgb(24, 125, 158);
        border: 2px solid gray;
        border-radius: 20px;
    }
    body {
        display: flex;
        margin: 0;
        overflow: hidden;
    }
    * {
        color: black;
    }
    .main-content {
        overflow-y: auto;
        width: 80%;
    }
    ::selection {
        background: orange;
        color: white;
    }
    #active {
        background-color: rgb(24, 125, 158);
        border: 2px solid gray;
        border-radius: 20px;
        cursor:auto;
    }
</style>
</head>
<body>
    <div class="side-bar">
        <ul id="side-bar-ul">
            <li>Tarih Hesaplamaları</li>
        </ul>
    </div>
    <main class="main-content">
    {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
    <script>
        const active=document.getElementById("side-bar-ul");
        let items=active.querySelectorAll("li");
        let activeChild = items[{% block active_number %}0{% endblock %}];
        activeChild.id="active";
    </script>
</body>
</html>
