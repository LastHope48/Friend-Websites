<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Projeler</title>
    <style>
        li {
            margin: 10px;
            font-size: 20px;
        }
        * {
            text-decoration: none;
            font-family: Arial, Helvetica, sans-serif;
        }
        a:visited {
            color: black;
        }
        body {
            background: linear-gradient(to right,orange,red)
        }
        a:hover {
            animation: color 2.5s infinite;
        }
        @keyframes color{
            0% {
                color: red;
            }
            14% {
                color: orange;
            }
            28% {
                color: yellow;
            }
            42% {
                color: green;
            }
            56% {
                color: blue;
            }
            70% {
                color: darkblue;
            }
            84% {
                color: purple;
            }
            100% {
                color: red;
            }
        }
    </style>
</head>
<body>
    <h1>Herkesin Projeleri!</h1>
    <hr>
    <br><br>
    <h2>İsteyen kişilerin küçük web siteleri burada!</h2>
    <br>
    <ol>
        <li><a href="/uras">Uras Köroğlu</a></li>
        <li><a href="/mehmet">Mehmet Serdar Eren</a></li>
    </ol>
</body>
</html>
